<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2196f3" />

  <title>不動産マップ</title>
  <style>
    #map { height: 100vh; width: 100%; }

    select#categoryFilter {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      padding: 10px 12px;
      border-radius: 4px;
      background-color: #fff;
      border: 1px solid #ccc;
      appearance: none;
      background-image: url("data:image/svg+xml,...");
      background-repeat: no-repeat;
      background-position: right 20px center;
      background-size: 24px;
    }

    #categoryBar {
      position: absolute;
      top: 70px;
      left: 10px;
      right: 10px;
      z-index: 999;
      background: white;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      border-radius: 8px;
    }

    #cityFilterContainer { margin-top: 10px; }
    #cityFilterContainer.hidden {
  display: none;
}


    .info-window {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      max-width: 300px;
      padding: 0;
      background-color: white;
      border: none;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }

    .info-window-header {
      padding: 10px 14px;
      color: white;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .info-window-body {
      padding: 12px 14px;
    }

    .info-window-title {
      font-size: 15px;
      font-weight: bold;
      color: #222;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .info-window-row {
      display: flex;
      align-items: baseline;
      margin-bottom: 6px;
      font-size: 13px;
      color: #444;
    }

    .info-window-label {
      font-size: 11px;
      color: #888;
      background: #f0f0f0;
      border-radius: 3px;
      padding: 1px 6px;
      margin-right: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .info-window-value {
      color: #333;
      word-break: break-all;
    }

    .info-window-price {
      font-size: 18px;
      font-weight: bold;
      color: #e53935;
      margin-bottom: 10px;
    }

    .info-window-pdf {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 14px;
      background: #1976d2;
      color: white !important;
      border-radius: 20px;
      font-size: 12px;
      text-decoration: none;
      font-weight: bold;
    }

    .info-window-pdf:hover {
      background: #1565c0;
    }

    @media (max-width: 768px) {
      .info-window {
        max-width: 92vw;
      }
      .info-window-header { font-size: 3.8vw; padding: 12px 16px; }
      .info-window-title  { font-size: 4.2vw; }
      .info-window-row    { font-size: 3.8vw; margin-bottom: 8px; }
      .info-window-label  { font-size: 3.2vw; }
      .info-window-price  { font-size: 5.5vw; }
      .info-window-pdf    { font-size: 3.5vw; padding: 8px 18px; }
    }
  </style>

  <script>
    let map;
    let allMarkers = [];
    let currentInfoWindow = null;
    let fullData = [];
    const isMobile = window.matchMedia("(max-width: 768px)").matches;
    let showContracted = true; // 初期状態：成約済みも表示する

document.addEventListener("DOMContentLoaded", () => {
  const toggleBtn = document.getElementById("toggleContractBtn");
  toggleBtn.addEventListener("click", () => {
    showContracted = !showContracted;
    toggleBtn.textContent = showContracted ? "成約済みを除外" : "成約済みを表示";
    const selectedCategory = document.getElementById("categoryFilter").value;
    renderMarkers(selectedCategory, '');
  });
});


    const iconMap = {
      "土地": "http://maps.google.com/mapfiles/ms/icons/green-dot.png",
      "戸建て": "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
      "マンション": "http://maps.google.com/mapfiles/ms/icons/purple-dot.png",
      "外人住宅": "http://maps.google.com/mapfiles/ms/icons/yellow-dot.png",
      "民泊運営物件": "http://maps.google.com/mapfiles/ms/icons/orange-dot.png",
      "その他": "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
    };

    const headerColorMap = {
      "土地":     "#43a047",
      "戸建て":   "#1e88e5",
      "マンション": "#8e24aa",
      "外人住宅": "#f9a825",
      "民泊運営物件": "#fb8c00",
      "名刺":     "#00897b",
      "その他":   "#e53935"
    };

    async function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 26.2124, lng: 127.6809 },
        zoom: isMobile ? 14 : 9,
      });
map.addListener('dragstart', () => {
  document.getElementById('cityFilterContainer').classList.add('hidden');
});
map.addListener('click', () => {
  document.getElementById('cityFilterContainer').classList.add('hidden');
});

      try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbwuYJQ7Oxjh0cyDDjmoEjFBhSbmUSZ1cO7uw0ONdnWojfQD36L8IVrMAa8O07haB2_Yqw/exec');
        fullData = await response.json();

        const categoryFilter = document.getElementById('categoryFilter');
        const cityFilterContainer = document.getElementById('cityFilterContainer');
        document.getElementById('cityFilterContainer').classList.remove('hidden');


        const categories = [...new Set(fullData.map(item => item.sheet))].filter(Boolean);
        categoryFilter.innerHTML = '<option value="">カテゴリを選択</option>' +
          categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');

        categoryFilter.addEventListener('change', (e) => {
          document.getElementById('cityFilterContainer').classList.remove('hidden');
  const selectedCategory = e.target.value;
  if (!selectedCategory) return;

          const cityOrder = [
            "名護市", "恩納村", "金武町", "宜野座村", "本部町", "今帰仁村", "大宜味村", "国頭村", "東村",
            "沖縄市", "浦添市", "宜野湾市", "うるま市", "読谷村", "西原町", "北谷町", "中城村", "北中城村", "嘉手納町",
            "那覇市", "豊見城市", "糸満市", "南風原町", "南城市", "与那原町", "八重瀬町",
            "石垣市", "宮古島市", "その他"
          ];

          const cities = [...new Set(fullData.filter(d => d.sheet === selectedCategory).map(d => d.city || '未設定'))];
          cities.sort((a, b) => {
            const indexA = cityOrder.indexOf(a);
            const indexB = cityOrder.indexOf(b);
            return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
          });

          cityFilterContainer.innerHTML = '<strong>市を選択：</strong><br>';

          const allBtn = document.createElement('button');
          allBtn.textContent = 'すべて';
          styleButton(allBtn);
          allBtn.style.background = '#e0e0e0';
          allBtn.onclick = () => renderMarkers(selectedCategory, '');
          cityFilterContainer.appendChild(allBtn);

          cities.forEach(city => {
            const btn = document.createElement('button');
            btn.textContent = city;
            styleButton(btn);
            btn.onclick = () => renderMarkers(selectedCategory, city);
            cityFilterContainer.appendChild(btn);
          });

          renderMarkers(selectedCategory, '');
        });

      } catch (err) {
        console.error("データ取得エラー:", err);
      }
    }
function checkPass() { /* password removed from history */ } else {
    document.getElementById('errorMsg').textContent = "パスコードが違います";
  }
}

    function styleButton(btn) {
      btn.style.margin = '4px';
      btn.style.padding = '6px 12px';
      btn.style.border = '1px solid #aaa';
      btn.style.borderRadius = '4px';
      btn.style.background = '#f5f5f5';
      btn.style.cursor = 'pointer';
    }

    function renderMarkers(category, city) {
      allMarkers.forEach(marker => marker.setMap(null));
      allMarkers = [];

      const filtered = fullData.filter(item =>
  item.sheet === category &&
  (!city || item.city === city) &&
  (showContracted || !item.status || item.status.trim() !== "成約済み")
);


      filtered.forEach(item => {
        const marker = new google.maps.Marker({
          position: { lat: parseFloat(item.lat), lng: parseFloat(item.lng) },
          map,
          icon: {
            url: iconMap[item.sheet] || iconMap["その他"],
            scaledSize: new google.maps.Size(32, 32)
          },
          title: item.name,
        });

        const headerColor = headerColorMap[item.sheet] || headerColorMap["その他"];

        const content = item.sheet === '名刺' ? `
          <div class="info-window">
            <div class="info-window-header" style="background:${headerColor};">🪪 名刺</div>
            <div class="info-window-body">
              <div class="info-window-title">${item.name || '---'}</div>
              <div class="info-window-row">
                <span class="info-window-label">担当者</span>
                <span class="info-window-value">${item.repName || '---'}</span>
              </div>
              <div class="info-window-row">
                <span class="info-window-label">TEL</span>
                <span class="info-window-value"><a href="tel:${item.repTel}" style="color:#1976d2;">${item.repTel || '---'}</a></span>
              </div>
              ${item.note ? `<div class="info-window-row"><span class="info-window-label">備考</span><span class="info-window-value">${item.note}</span></div>` : ''}
              ${item.pdf ? `<div><a class="info-window-pdf" href="${item.pdf}" target="_blank">📄 PDFを見る</a></div>` : ''}
            </div>
          </div>
        ` : `
          <div class="info-window">
            <div class="info-window-header" style="background:${headerColor};">🏠 ${item.sheet}</div>
            <div class="info-window-body">
              <div class="info-window-title">${item.name || '---'}</div>
              ${item.price ? `<div class="info-window-price">¥ ${item.price} 万円</div>` : ''}
              ${item.unit ? `<div class="info-window-row"><span class="info-window-label">坪単価</span><span class="info-window-value">${item.unit} 万円</span></div>` : ''}
              ${item.source ? `<div class="info-window-row"><span class="info-window-label">紹介元</span><span class="info-window-value">${item.source}</span></div>` : ''}
              ${item.status ? `<div class="info-window-row"><span class="info-window-label">状況</span><span class="info-window-value">${item.status}</span></div>` : ''}
              ${item.note ? `<div class="info-window-row"><span class="info-window-label">備考</span><span class="info-window-value">${item.note}</span></div>` : ''}
              ${item.pdf ? `<div><a class="info-window-pdf" href="${item.pdf}" target="_blank">📄 PDFを見る</a></div>` : ''}
            </div>
          </div>
        `;

        const infowindow = new google.maps.InfoWindow({ content });

        marker.addListener("click", () => {
          if (currentInfoWindow) currentInfoWindow.close();
          infowindow.open({ anchor: marker, map });
          currentInfoWindow = infowindow;
        });


        allMarkers.push(marker);
      });
    }
  </script>
</head>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker
      .register("service-worker.js")
      .then((reg) => {
        console.log("Service Worker registered", reg);
      })
      .catch((err) => {
        console.error("Service Worker registration failed", err);
      });
  }
</script>
<body>
  <div id="categoryBar">
    <!-- ① ボタンを追加 -->
<button id="toggleContractBtn" style="margin: 10px; padding: 6px 12px; font-size: 16px;">成約済みを除外</button>

    <select id="categoryFilter">
      <option>カテゴリを選択</option>
    </select>
    <div id="cityFilterContainer" class="hidden"></div>
  </div>
  <div id="map"></div>
  <div id="loginScreen" style="
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  flex-direction: column;
">
  <h2>パスコードを入力してください</h2>
  <input type="password" id="passInput" style="font-size: 24px; padding: 10px; margin: 10px;">
  <button onclick="checkPass()" style="font-size: 20px; padding: 8px 16px;">ログイン</button>
  <div id="errorMsg" style="color: red; margin-top: 10px;"></div>
</div>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCYQnbLmcGyA0-2U5eEuLxYYeSDEn9z_nA"
    async defer
  ></script>
</body>
</html>
